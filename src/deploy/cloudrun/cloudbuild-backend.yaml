# =============================================================================
# Cloud Build — KineTwin Backend (FastAPI)  [SCAFFOLD-style]
# =============================================================================
# Usage:
#   gcloud builds submit --config src/deploy/cloudrun/cloudbuild-backend.yaml \
#     --project gen-lang-client-0658701327
#
# Isolated from SCAFFOLD: image lives in repo "kinetwin" (NOT "scaffold"),
# deployed as Cloud Run service "kinetwin-backend" (NOT scaffold-*).
# =============================================================================

substitutions:
  _REGION: "asia-southeast1"
  _PROJECT: "gen-lang-client-0658701327"
  _REPO: "kinetwin"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - "build"
      - "-f"
      - "Dockerfile.backend"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:latest"
      - "."
    waitFor: ["-"]
    timeout: "600s"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    args: ["push", "${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:latest"]
    waitFor: ["build-backend"]
    timeout: "300s"

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${_PROJECT}/${_REPO}/backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

timeout: "1200s"
