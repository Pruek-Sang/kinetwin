server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # API -> backend service (compose service name "backend")
    location /analyze {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
    location /health {
        proxy_pass http://backend:8000;
    }
}
