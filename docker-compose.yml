# KineTwin full-stack (isolated names: kinetwin-*).
#   docker compose up --build
# Frontend  -> http://localhost:5173   Backend -> http://localhost:8000
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: kinetwin-backend
    container_name: kinetwin-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    image: kinetwin-frontend
    container_name: kinetwin-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
